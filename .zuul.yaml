- job:
    name: devstack-plugin-container-dsvm
    parent: devstack
    pre-run: playbooks/devstack-plugin-container-dsvm/pre.yaml
    run: playbooks/devstack-plugin-container-dsvm/run.yaml
    post-run: playbooks/devstack-plugin-container-dsvm/post.yaml
    timeout: 4200
    required-projects:
      - openstack/devstack
      - openstack/devstack-plugin-container
    vars:
      devstack_plugins:
        devstack-plugin-container: https://opendev.org/openstack/devstack-plugin-container

- job:
    name: devstack-plugin-container-k8s
    parent: devstack-minimal
    nodeset: openstack-two-node-noble
    pre-run: playbooks/devstack-plugin-container-k8s/pre.yaml
    run: playbooks/devstack-plugin-container-k8s/run.yaml
    post-run: playbooks/devstack-plugin-container-k8s/post.yaml
    timeout: 7200
    required-projects:
      - openstack/devstack
      - openstack/devstack-plugin-container
    vars:
      devstack_services:
        # Ignore any default set by devstack. Emit a "disable_all_services".
        base: false
        etcd3: true
        container: true
        k8s-master: true
        mysql: false
        openstack-cli-server: false
        rabbit: false
      devstack_localrc: &k8s_base_devstack_localrc
        CONTAINER_ENGINE: "crio"
        CRIO_INSTALL_PODMAN: "false"
        ETCD_VERSION: "v3.6.6"
        ETCD_SHA256_AMD64: "887afaa4a99f22d802ccdfbe65730a5e79aa5c9ce2c8799c67e9d804c50ecedb"
        K8S_TOKEN: "9agf12.zsu5uh2m4pzt3qba"
      devstack_plugins:
        devstack-plugin-container: https://opendev.org/openstack/devstack-plugin-container
    group-vars:
      subnode:
        devstack_services:
          # Ignore any default set by devstack. Emit a "disable_all_services".
          base: false
          container: true
          k8s-node: true
        devstack_localrc: *k8s_base_devstack_localrc

- project:
    check:
      jobs:
        - openstack-tox-bashate
        - devstack-plugin-container-dsvm
        - devstack-plugin-container-k8s
    gate:
      jobs:
        - openstack-tox-bashate
        - devstack-plugin-container-dsvm
        - devstack-plugin-container-k8s
